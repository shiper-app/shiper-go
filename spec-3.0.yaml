info:
  title: Shiper API
  version: 2.0.0
servers:
  - url: http://localhost:5000/v2
openapi: 3.0.3
components:
  schemas:
    Project:
      type: object
      properties:
        projectId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
        userId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
        displayName:
          type: string
        slug:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        basePath:
          type: string
        framework:
          type: string
        repository:
          type: string
        connectorInstanceId:
          type: string
          nullable: true
        targetType:
          type: string
        enabled:
          type: boolean
        createdAt:
          anyOf:
            - type: string
            - type: string
              format: date-time
              x-native-type: date
        productionResourceLimit:
          $ref: "#/components/schemas/ResourceLimit"
        previewResourceLimit:
          $ref: "#/components/schemas/ResourceLimit"
        buildParameters:
          type: array
          items:
            $ref: "#/components/schemas/BuildParameter"
        productionBranch:
          type: string
        githubInstallationId:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          nullable: true
        replicas:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
      required:
        - projectId
        - userId
        - displayName
        - slug
        - framework
        - repository
        - enabled
        - createdAt
        - productionResourceLimit
        - previewResourceLimit
    ProjectWithCounts:
      type: object
      properties:
        projectId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
        userId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
        displayName:
          type: string
        slug:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        basePath:
          type: string
        framework:
          type: string
        repository:
          type: string
        connectorInstanceId:
          type: string
          nullable: true
        targetType:
          type: string
        enabled:
          type: boolean
        createdAt:
          anyOf:
            - type: string
            - type: string
              format: date-time
              x-native-type: date
        productionResourceLimit:
          $ref: "#/components/schemas/ResourceLimit"
        previewResourceLimit:
          $ref: "#/components/schemas/ResourceLimit"
        buildParameters:
          type: array
          items:
            $ref: "#/components/schemas/BuildParameter"
        productionBranch:
          type: string
        githubInstallationId:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          nullable: true
        replicas:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        activePreviewEnvironments:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
      required:
        - projectId
        - userId
        - displayName
        - slug
        - framework
        - repository
        - enabled
        - createdAt
        - productionResourceLimit
        - previewResourceLimit
        - activePreviewEnvironments
    ProjectListItem:
      type: object
      properties:
        projectId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
        userId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
        displayName:
          type: string
        slug:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        basePath:
          type: string
        framework:
          type: string
        repository:
          type: string
        connectorInstanceId:
          type: string
          nullable: true
        targetType:
          type: string
        enabled:
          type: boolean
        createdAt:
          anyOf:
            - type: string
            - type: string
              format: date-time
              x-native-type: date
        productionResourceLimit:
          $ref: "#/components/schemas/ResourceLimit"
        previewResourceLimit:
          $ref: "#/components/schemas/ResourceLimit"
        buildParameters:
          type: array
          items:
            $ref: "#/components/schemas/BuildParameter"
        productionBranch:
          type: string
        githubInstallationId:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          nullable: true
        replicas:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        activePreviewEnvironments:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        userName:
          type: string
      required:
        - projectId
        - userId
        - displayName
        - slug
        - framework
        - repository
        - enabled
        - createdAt
        - productionResourceLimit
        - previewResourceLimit
        - activePreviewEnvironments
        - userName
    ResourceLimit:
      type: object
      properties:
        cpu:
          type: number
          minimum: 0
        memory:
          type: number
          minimum: 0
      required:
        - cpu
        - memory
    BuildParameter:
      type: object
      properties:
        key:
          type: string
        value:
          anyOf:
            - type: string
            - type: boolean
      required:
        - key
    User:
      type: object
      properties:
        installations:
          type: array
          items:
            type: object
            properties:
              githubInstallationId:
                type: integer
                minimum: -9007199254740991
                maximum: 9007199254740991
            required:
              - githubInstallationId
        blocked:
          type: boolean
        name:
          type: string
        email:
          type: string
        image:
          type: string
        acceptedTerms:
          type: boolean
        stripeSubscriptionId:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        userId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
      required:
        - installations
        - blocked
        - name
        - email
        - image
        - acceptedTerms
        - stripeSubscriptionId
        - role
        - userId
    UserRole:
      enum:
        - user
        - admin
      type: string
    Deployment:
      type: object
      properties:
        id:
          type: string
        environmentId:
          type: string
        primary:
          type: boolean
        state:
          $ref: "#/components/schemas/DeploymentState"
        githubDeploymentId:
          type: string
        commitSha:
          type: string
        commitMessage:
          type: string
          nullable: true
        commitUrl:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        defaultDomain:
          type: string
          nullable: true
        correlationId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        buildStartedAt:
          type: string
          format: date-time
          nullable: true
        buildFinishedAt:
          type: string
          format: date-time
          nullable: true
        deployStartedAt:
          type: string
          format: date-time
          nullable: true
        deployFinishedAt:
          type: string
          format: date-time
          nullable: true
        disabledAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - environmentId
        - primary
        - state
        - githubDeploymentId
        - commitSha
        - commitMessage
        - commitUrl
        - image
        - defaultDomain
        - correlationId
        - createdAt
        - updatedAt
        - buildStartedAt
        - buildFinishedAt
        - deployStartedAt
        - deployFinishedAt
        - disabledAt
        - cancelledAt
    DeploymentState:
      enum:
        - pending
        - success
        - failure
        - in_progress
        - queued
        - error
        - inactive
      type: string
    Environment:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        branch:
          type: string
        production:
          type: boolean
        enabled:
          type: boolean
      required:
        - id
        - projectId
        - branch
        - production
        - enabled
    Domain:
      type: object
      properties:
        name:
          type: string
        default:
          type: boolean
        environmentId:
          type: string
      required:
        - name
        - default
        - environmentId
    Variable:
      type: object
      properties:
        variableId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
        environmentId:
          anyOf:
            - enum:
                - all
                - production
                - preview
              type: string
            - type: string
              pattern: ^[cC][^\s-]{8,}$
        name:
          type: string
          maxLength: 191
          pattern: "[a-zA-Z_]+[a-zA-Z0-9_]*"
        value:
          type: string
          maxLength: 8192
      required:
        - environmentId
        - name
        - value
    Framework:
      type: object
      properties:
        frameworkId:
          type: string
        displayName:
          type: string
        buildOptions:
          type: array
          items:
            $ref: "#/components/schemas/BuildOption"
        icon:
          type: string
        resourceTemplates:
          type: array
          items:
            $ref: "#/components/schemas/ResourceTemplate"
        initializationNotice:
          $ref: "#/components/schemas/InitializationNotice"
      required:
        - frameworkId
        - displayName
        - buildOptions
        - icon
        - resourceTemplates
    BuildOption:
      type: object
      properties:
        buildOptionId:
          type: string
        name:
          type: string
        description:
          type: string
        required:
          type: boolean
        enum:
          type: array
          items:
            type: string
        default:
          anyOf:
            - type: string
            - type: boolean
        type:
          enum:
            - input
            - checkbox
            - dropdown
            - file
            - folder
          type: string
      required:
        - buildOptionId
        - name
        - description
        - required
        - type
    ResourceTemplate:
      type: object
      properties:
        milliCpu:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        memoryMb:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        storageMb:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
        displayName:
          type: string
        description:
          type: string
      required:
        - milliCpu
        - memoryMb
        - storageMb
        - displayName
        - description
    InitializationNotice:
      type: object
      properties:
        type:
          enum:
            - info
            - warning
            - error
          type: string
        message:
          type: string
        title:
          type: string
      required:
        - type
        - title
    ProjectAcl:
      type: object
      properties:
        projectId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
        userId:
          type: string
          pattern: ^[cC][^\s-]{8,}$
        userName:
          type: string
        userEmail:
          type: string
        userImage:
          type: string
        role:
          $ref: "#/components/schemas/AclRole"
        createdAt:
          anyOf:
            - type: string
            - type: string
              format: date-time
              x-native-type: date
        updatedAt:
          anyOf:
            - type: string
            - type: string
              format: date-time
              x-native-type: date
      required:
        - projectId
        - userId
        - userName
        - userEmail
        - userImage
        - role
        - createdAt
        - updatedAt
    AclRole:
      enum:
        - ADMIN
        - WRITE
        - READ
      type: string
    QosPolicy:
      type: object
      properties:
        qosPolicyId:
          enum:
            - best-effort
            - high-priority
          type: string
        priorityClassName:
          type: string
        resources:
          type: object
          properties:
            requestFactor:
              type: object
              properties:
                cpu:
                  type: number
                memory:
                  type: number
                ephemeralStorage:
                  type: number
              required:
                - cpu
                - memory
                - ephemeralStorage
          required:
            - requestFactor
      required:
        - qosPolicyId
        - priorityClassName
        - resources
paths:
  /users:
    get:
      operationId: user.list
      summary: List Users
      description: Get a list of users
      tags:
        - User
        - Internal
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                required:
                  - data
  /users/{id}:
    get:
      operationId: user.get
      summary: Get a User
      description: Get a user by ID
      tags:
        - User
        - Internal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /users/me:
    get:
      operationId: user.me
      summary: Get Current User
      description: Get the currently authenticated user
      tags:
        - User
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /users/search:
    get:
      operationId: user.search
      summary: Search Users
      description: Search users by name or email
      tags:
        - User
      parameters:
        - name: q
          in: query
          schema:
            type: string
            minLength: 3
            maxLength: 255
          allowEmptyValue: true
          allowReserved: true
        - name: id
          in: query
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
          allowEmptyValue: true
          allowReserved: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                          pattern: ^[cC][^\s-]{8,}$
                        name:
                          type: string
                        email:
                          type: string
                        image:
                          type: string
                        blocked:
                          type: boolean
                        isSubscriber:
                          type: boolean
                      required:
                        - userId
                        - name
                        - email
                        - image
                        - blocked
                        - isSubscriber
                required:
                  - data
  /admin/ping:
    post:
      operationId: admin.ping
      responses:
        "200":
          description: OK
  /projects:
    post:
      operationId: project.create
      summary: Create a Project
      description: Create a new project
      tags:
        - Project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  properties:
                    displayName:
                      type: string
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                    basePath:
                      type: string
                    framework:
                      type: string
                    repository:
                      type: string
                    connectorInstanceId:
                      type: string
                      nullable: true
                    targetType:
                      type: string
                    productionResourceLimit:
                      $ref: "#/components/schemas/ResourceLimit"
                    previewResourceLimit:
                      $ref: "#/components/schemas/ResourceLimit"
                    buildParameters:
                      type: array
                      items:
                        $ref: "#/components/schemas/BuildParameter"
                    productionBranch:
                      type: string
                    githubInstallationId:
                      type: integer
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                      nullable: true
                    replicas:
                      type: integer
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                  required:
                    - displayName
                    - framework
                    - repository
                    - productionResourceLimit
                    - previewResourceLimit
                - type: object
                  properties:
                    activeEnvironments:
                      type: array
                      items:
                        type: string
                    unstable_targetType:
                      type: string
      responses:
        "201":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId:
                    type: string
                    pattern: ^[cC][^\s-]{8,}$
                required:
                  - projectId
    get:
      operationId: project.list
      summary: List Projects
      description: Get a list of projects owned or accessible by the user
      tags:
        - Project
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
          allowEmptyValue: true
          allowReserved: true
        - name: enabled
          in: query
          schema:
            type: boolean
          allowEmptyValue: true
          allowReserved: true
        - name: targetType
          in: query
          schema:
            type: string
          allowEmptyValue: true
          allowReserved: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectListItem"
                required:
                  - data
  /projects/{projectId}:
    get:
      operationId: project.get
      summary: Get a Project
      description: Get a project by id
      tags:
        - Project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWithCounts"
    delete:
      operationId: project.delete
      summary: Delete a Project
      description: Delete a project by id
      tags:
        - Project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      responses:
        "200":
          description: OK
    put:
      operationId: project.update
      summary: Update a Project
      description: Update a project by id
      tags:
        - Project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                basePath:
                  type: string
                previewResourceLimit:
                  $ref: "#/components/schemas/ResourceLimit"
                productionResourceLimit:
                  $ref: "#/components/schemas/ResourceLimit"
                buildParameters:
                  type: array
                  items:
                    $ref: "#/components/schemas/BuildParameter"
                productionBranch:
                  type: string
                framework:
                  type: string
      responses:
        "200":
          description: OK
  /projects/{projectId}/acls:
    post:
      operationId: project.acl.create
      summary: Create a Project ACL
      description: Create a new project acl
      tags:
        - Project ACL
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  pattern: ^[cC][^\s-]{8,}$
                role:
                  $ref: "#/components/schemas/AclRole"
              required:
                - userId
                - role
      responses:
        "201":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId:
                    type: string
                    pattern: ^[cC][^\s-]{8,}$
                  userId:
                    type: string
                    pattern: ^[cC][^\s-]{8,}$
                required:
                  - projectId
                  - userId
    get:
      operationId: project.acl.list
      summary: List Project ACLs
      description: Get a list of project acls
      tags:
        - Project ACL
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectAcl"
                required:
                  - data
  /projects/{projectId}/acls/{userId}:
    get:
      operationId: project.acl.get
      summary: Get a Project ACL
      description: Get a project acl by projectId and userId
      tags:
        - Project ACL
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
        - name: userId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectAcl"
    put:
      operationId: project.acl.update
      summary: Update a Project ACL
      description: Update a project acl by projectId and userId
      tags:
        - Project ACL
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
        - name: userId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  $ref: "#/components/schemas/AclRole"
              required:
                - role
      responses:
        "200":
          description: OK
    delete:
      operationId: project.acl.delete
      summary: Delete a Project ACL
      description: Delete a project acl by projectId and userId
      tags:
        - Project ACL
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
        - name: userId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      responses:
        "200":
          description: OK
  /projects/{projectId}/variables:
    get:
      operationId: project.variables.list
      summary: List Variables
      description: Get all environment variables for a project
      tags:
        - Variables
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
        - name: environmentId
          in: query
          schema:
            anyOf:
              - enum:
                  - all
                  - production
                  - preview
                type: string
              - type: string
                pattern: ^[cC][^\s-]{8,}$
          style: deepObject
          explode: true
          allowEmptyValue: true
          allowReserved: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  variables:
                    type: array
                    items:
                      $ref: "#/components/schemas/Variable"
                required:
                  - variables
    post:
      operationId: project.variables.upsert
      summary: Upsert Variables
      description: Create or update multiple environment variables
      tags:
        - Variables
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                variables:
                  type: array
                  minItems: 1
                  items:
                    $ref: "#/components/schemas/Variable"
              required:
                - variables
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                  updated:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                required:
                  - created
                  - updated
    delete:
      operationId: project.variables.delete
      summary: Delete Variables
      description: Delete multiple environment variables by ID
      tags:
        - Variables
      parameters:
        - name: projectId
