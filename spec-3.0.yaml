    post:
      operationId: project.environments.domains.add
      summary: Add Custom Domain
      description: Add a custom domain to an environment
      tags:
        - Domain
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
        - name: environmentId
          in: path
          required: true
          schema:
            type: string
            pattern: ^[cC][^\s-]{8,}$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: string
                  pattern: >-
                    ^(?!:\/\/)(?=.{1,255}$)((.{1,63}\.){1,127}(?![0-9]*$)[a-z0-9-]+\.?)$
              required:
                - domain
      responses:
        '200':
          description: OK
